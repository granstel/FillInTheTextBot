name: .NET

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x
    - name: Restore dependencies
      run: dotnet restore FillInTheTextBot.slnx
    - name: Build
      run: dotnet build FillInTheTextBot.slnx --no-restore
    - name: Run Unit Tests
      run: dotnet test FillInTheTextBot.slnx --no-build --verbosity normal --filter "Category!=E2E"
    - name: Run E2E Tests
      run: dotnet test FillInTheTextBot.slnx --no-build --verbosity normal --filter "Category=E2E"
